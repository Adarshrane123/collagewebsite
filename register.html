<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Vivekananda Polytechnic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">VPS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                   
                    <li class="nav-item"><a class="nav-link ms-2" href="profile.html" title="Profile"><i class="fas fa-user-circle fa-lg text-white"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="page-header py-5">
        <div class="container">
            <div class="row">
                <div class="col-12 text-center">
                    <h1 class="page-title">Create Account</h1>
                    <p class="page-subtitle">Register as a Student or Faculty to access resources</p>
                </div>
            </div>
        </div>
    </section>

    <section class="register-section py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <form id="registerForm" novalidate>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Full Name</label>
                                        <input type="text" class="form-control" id="fullName" placeholder="Your full name" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Account Type</label>
                                        <select class="form-select" id="accountType">
                                            <option value="student" selected>Student</option>
                                            <option value="faculty">Faculty</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Roll Number / Employee ID</label>
                                        <input type="text" class="form-control" id="regId" placeholder="Optional for faculty" >
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Password</label>
                                        <input type="password" class="form-control" id="regPassword" placeholder="Create a password" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Confirm Password</label>
                                        <input type="password" class="form-control" id="regPassword2" placeholder="Confirm password" required>
                                    </div>
                                </div>

                                <div class="mt-4 d-grid">
                                    <button type="submit" class="btn btn-success btn-lg">Create Account</button>
                                </div>

                                <div class="text-center mt-3">
                                    <small>Already have an account? <a href="profile.html">Go to Profile</a></small>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer mt-5">
        <div class="container text-center py-4">
            <p>&copy; Vivekananda Polytechnic Sitasaongi</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Success toast (hidden by default) -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
        <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">Account created successfully</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script>
        // Basic front-end validation: check passwords match
        document.getElementById('registerForm').addEventListener('submit', function(e){
            e.preventDefault();
            const p1 = document.getElementById('regPassword').value;
            const p2 = document.getElementById('regPassword2').value;
            if(p1 !== p2){
                // Use Bootstrap's native alert as fallback
                alert('Passwords do not match');
                return;
            }

            // Show success toast then redirect to home
            const toastEl = document.getElementById('successToast');
            const toast = new bootstrap.Toast(toastEl, { delay: 1800 });
            toast.show();

            // Reset form and redirect after toast hides
            this.reset();
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1800);
        });
    </script>
</body>
</html>
